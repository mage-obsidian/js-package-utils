name: CI

on:
    push:
    pull_request:

jobs:
    jest:
        name: Jest (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: ["20", "22"]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
            - run: npm install
            - run: npm test

    lint:
        name: Lint & format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
            - run: npm install
            - name: Oxlint (fast pre-filter)
              run: npm run lint:fast
            - name: ESLint
              run: npm run lint
            - name: Prettier format check
              run: npm run format:check
